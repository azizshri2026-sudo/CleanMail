name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Shared Gradle cache key fragments
env:
  GRADLE_CACHE_KEY: gradle-${{ hashFiles('**/*.toml', '**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Unit tests  (KMP/JVM — fast, no aapt2 needed)
  # ─────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (KMP / JVM)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ env.GRADLE_CACHE_KEY }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Compile shared (JVM)
        run: ./gradlew :shared:compileKotlinJvm --no-daemon --stacktrace

      - name: Run unit tests
        run: ./gradlew :shared:jvmTest --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-jvm
          path: shared/build/reports/tests/jvmTest/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Android debug APK  (x86_64 runner — aapt2 works natively)
  # ─────────────────────────────────────────────────────────────────────────
  android-build:
    name: Android Debug APK
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ env.GRADLE_CACHE_KEY }}
          restore-keys: gradle-

      # ubuntu-latest ships Android SDK; install the exact versions we need
      - name: Install required Android SDK components
        run: |
          SDKMANAGER=$(find "$ANDROID_HOME" -name sdkmanager -type f | head -1)
          yes | "$SDKMANAGER" --licenses
          yes | "$SDKMANAGER" \
            "platform-tools" \
            "build-tools;34.0.0" \
            "platforms;android-34"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew :android:assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cleanmail-debug
          path: android/build/outputs/apk/debug/android-debug.apk
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────
  # 3. Android Lint
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ env.GRADLE_CACHE_KEY }}
          restore-keys: gradle-

      - name: Install Android SDK components
        run: |
          SDKMANAGER=$(find "$ANDROID_HOME" -name sdkmanager -type f | head -1)
          yes | "$SDKMANAGER" --licenses
          yes | "$SDKMANAGER" "build-tools;34.0.0" "platforms;android-34"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run Android Lint
        run: ./gradlew :android:lintDebug --no-daemon

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: android/build/reports/lint-results-debug.html
          retention-days: 14
